<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
    </head>
    <body>
        <script src="losangeles.js"></script>
        <h2>Route Info</h2>

        <table border="1">
            <thead>
                <tr>
                    <th>Agency</th>
                    <th>Route</th>
                    <th>Color</th>
                    <th>Type</th>
                    <th>URL</th>
                </tr>
            </thead>
            <tbody id="routeTable"></tbody>
        </table>

        <br />
        <h1>GetStationDepartures</h1>
        <p>Get Station Departures using OSM id</p>
        <h2>Station Stops</h2>

        <table border="1">
            <thead>
                <tr>
                    <th>Stop ID</th>
                    <th>Name</th>
                    <th>Code</th>
                    <th>Parent Station</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                </tr>
            </thead>
            <tbody id="stopsTable"></tbody>
        </table>
        <table border="1">
            <thead>
                <tr>
                    <th>Route ID</th>

                    <th>Name</th>

                    <th>Type</th>

                    <th>Color</th>

                    <th>URL</th>
                </tr>
            </thead>

            <tbody id="routesTable"></tbody>
        </table>
        <h2>Departures</h2>
        Get Departures for Station
        <table border="1">
            <thead>
                <tr>
                    <th>Scheduled</th>
                    <th>Realtime</th>
                    <th>Type</th>
                    <th>Destination</th>
                    <th>URL</th>
                </tr>
            </thead>
            <tbody id="eventTable"></tbody>
        </table>
        <table border="1">
            <thead></thead>
            <tbody id="alertsTable"></tbody>
        </table>
        <script></script>
    </body>
</html>
